<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akın Cafe - Dijital Sipariş Sistemi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/modern/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .cafe-header { background: linear-gradient(135deg, #e67e22, #d35400); color: white; padding: 40px 20px; text-align: center; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .menu-card { border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .menu-card:hover { transform: translateY(-5px); }
        .btn-order { background-color: #e67e22; color: white; border: none; }
        .btn-order:hover { background-color: #d35400; color: white; }
        .cart-badge { position: fixed; bottom: 20px; right: 20px; z-index: 1000; padding: 15px 25px; border-radius: 50px; font-size: 18px; }
    </style>
</head>
<body>

    <div class="cafe-header mb-4">
        <h1 class="fw-bold">AKIN CAFE</h1>
        <p class="lead mb-0">Masanızdan Hızlıca Sipariş Verin</p>
    </div>

    <div class="container pb-5">
        <div class="row mb-4">
            <div class="col-md-6 mx-auto">
                <div class="card p-3 shadow-sm" style="border-radius: 12px;">
                    <label for="tableNumber" class="form-label fw-bold text-secondary">Masa Numaranız:</label>
                    <select id="tableNumber" class="form-select form-select-lg">
                        <option value="">Lütfen seçiniz...</option>
                        <option value="Masa 1">Masa 1</option>
                        <option value="Masa 2">Masa 2</option>
                        <option value="Masa 3">Masa 3</option>
                        <option value="Masa 4">Masa 4</option>
                        <option value="Masa 5">Masa 5</option>
                    </select>
                </div>
            </div>
        </div>

        <h3 class="text-center mb-4 fw-bold text-dark">Menü</h3>
        <div class="row g-3">
            <div class="col-6 col-md-4">
                <div class="card h-100 menu-card p-2 text-center">
                    <div class="card-body">
                        <h5 class="card-title fw-bold">Türk Kahvesi</h5>
                        <p class="card-text text-muted">60 TL</p>
                        <button class="btn btn-sm btn-order w-100 rounded-pill" onclick="addToCart('Türk Kahvesi', 60)">Ekle</button>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-4">
                <div class="card h-100 menu-card p-2 text-center">
                    <div class="card-body">
                        <h5 class="card-title fw-bold">Çay</h5>
                        <p class="card-text text-muted">25 TL</p>
                        <button class="btn btn-sm btn-order w-100 rounded-pill" onclick="addToCart('Çay', 25)">Ekle</button>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-4">
                <div class="card h-100 menu-card p-2 text-center">
                    <div class="card-body">
                        <h5 class="card-title fw-bold">Hamburger</h5>
                        <p class="card-text text-muted">180 TL</p>
                        <button class="btn btn-sm btn-order w-100 rounded-pill" onclick="addToCart('Hamburger', 180)">Ekle</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button class="btn btn-warning shadow-lg cart-badge fw-bold" data-bs-toggle="modal" data-bs-target="#cartModal">
        🛒 Sepetim (<span id="cartCount">0</span>)
    </button>

    <div class="modal fade" id="cartModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius: 20px;">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Siparişiniz</h5>
                    <button type="button" class="btn-close" data-bs-shadow="none" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <ul id="cartItems" class="list-group list-group-flush mb-3">
                        </ul>
                    
                    <div class="mb-3">
                        <label for="orderNote" class="form-label fw-bold">Sipariş Notu (İsteğe Bağlı):</label>
                        <textarea id="orderNote" class="form-control" rows="2" placeholder="Örn: Kahve orta şekerli olsun, ketçap az olsun..."></textarea>
                    </div>
                    
                    <h5 class="text-end fw-bold text-danger">Toplam: <span id="cartTotal">0</span> TL</h5>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary rounded-pill" data-bs-dismiss="modal">Kapat</button>
                    <button type="button" class="btn btn-order px-4 rounded-pill fw-bold" onclick="sendOrder()">Siparişi Tamamla</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let cart = [];

        function addToCart(name, price) {
            cart.push({name, price});
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cartCount').innerText = cart.length;
            const cartItems = document.getElementById('cartItems');
            const cartTotal = document.getElementById('cartTotal');
            
            cartItems.innerHTML = '';
            let total = 0;

            if(cart.length === 0) {
                cartItems.innerHTML = '<li class="list-group-item text-muted text-center">Sepetiniz boş.</li>';
            } else {
                cart.forEach((item, index) => {
                    total += item.price;
                    cartItems.innerHTML += `
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            ${item.name} - ${item.price} TL
                            <button class="btn btn-sm btn-danger rounded-pill" onclick="removeFromCart(${index})">Sil</button>
                        </li>`;
                });
            }
            cartTotal.innerText = total;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function sendOrder() {
            const table = document.getElementById('tableNumber').value;
            const note = document.getElementById('orderNote').value;

            if(!table) {
                alert('Lütfen sipariş vermeden önce Masa Numaranızı seçin!');
                return;
            }
            if(cart.length === 0) {
                alert('Sepetinizde ürün bulunmamaktadır!');
                return;
            }

            // Sipariş metnini hazırlayalım
            let orderText = `*AKIN CAFE SİPARİŞİ*\n`;
            orderText += `📍 *Konum:* ${table}\n`;
            orderText += `📝 *Not:* ${note ? note : 'Yok'}\n\n`;
            orderText += `🛒 *Ürünler:* \n`;
            
            cart.forEach(item => {
                orderText += `- ${item.name} (${item.price} TL)\n`;
            });
            
            orderText += `\n💰 *Toplam Tutar:* ${document.getElementById('cartTotal').innerText} TL`;

            // WhatsApp Entegrasyonu (Siparişi işletme telefonuna mesaj olarak atar)
            // Lütfen aşağıdaki '905XXXXXXXXX' kısmına kendi telefon numaranızı yazın!
            const phoneNumber = "905XXXXXXXXX"; 
            const whatsappUrl = `https://api.whatsapp.com/send?phone=${phoneNumber}&text=${encodeURIComponent(orderText)}`;
            
            window.open(whatsappUrl, '_blank');
            
            // Sepeti sıfırla
            cart = [];
            document.getElementById('orderNote').value = '';
            updateCartUI();
            
            // Modalı kapat
            const modal = bootstrap.Modal.getInstance(document.getElementById('cartModal'));
            modal.hide();
        }
    </script>
</body>
</html>
